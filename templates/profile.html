{% extends "base.html" %}

{% block content %}

<div class="container">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">
            <h3>👤 User Profile</h3>
        </div>

        <div class="card-body">

            <table class="table">

                <tr>
                    <th>Username</th>
                    <td>{{ username }}</td>
                </tr>

                <tr>
                    <th>Role</th>
                    <td>Administrator</td>
                </tr>

                <tr>
                    <th>System</th>
                    <td>Evidence Guard</td>
                </tr>

                <tr>
                    <th>Status</th>
                    <td><span class="badge bg-success">Active</span></td>
                </tr>

            </table>

            <a href="/dashboard" class="btn btn-primary">
                Back to Dashboard
            </a>

        </div>

    </div>

</div>

{% endblock %}
