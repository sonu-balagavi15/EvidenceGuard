{% extends "base.html" %}

{% block content %}

<div class="container">

<h2 class="mb-4">👥 Registered Users</h2>

<table class="table table-bordered table-striped">

    <thead class="table-dark">

        <tr>

            <th>ID</th>
            <th>Username</th>

        </tr>

    </thead>

    <tbody>

        {% for user in users %}

        <tr>

            <td>{{ user.id }}</td>
            <td>{{ user.username }}</td>

        </tr>

        {% endfor %}

    </tbody>

</table>

<a href="/admin" class="btn btn-primary">
    ← Back to Admin
</a>

</div>

{% endblock %}
