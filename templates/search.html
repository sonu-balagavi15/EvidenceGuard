{% extends "base.html" %}

{% block content %}

<h2>Search Evidence</h2>

<form method="GET" action="/search">

<div class="input-group mb-3">

<input
type="text"
name="query"
class="form-control"
placeholder="Search by filename..."
value="{{ query or '' }}">

<button class="btn btn-primary">
Search
</button>

</div>

</form>

<table class="table table-bordered table-striped">

<tr>
<th>ID</th>
<th>Filename</th>
<th>SHA256 Hash</th>
<th>Uploaded</th>
</tr>

{% for item in evidence %}

<tr>

<td>{{ item.id }}</td>

<td>{{ item.filename }}</td>

<td>{{ item.file_hash }}</td>

<td>{{ item.upload_time }}</td>

</tr>

{% endfor %}

</table>

{% endblock %}
