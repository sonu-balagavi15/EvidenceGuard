<!DOCTYPE html>
<html>
<head>
    <title>Chain of Custody Log</title>

    <style>

        body{
            font-family:Arial;
            background:#f4f4f4;
            margin:30px;
        }

        h1{
            text-align:center;
            color:#333;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
        }

        th{
            background:#0d6efd;
            color:white;
            padding:12px;
        }

        td{
            padding:10px;
            border:1px solid #ddd;
            text-align:center;
        }

        tr:nth-child(even){
            background:#f8f9fa;
        }

        .btn{
            display:inline-block;
            padding:10px 18px;
            background:#198754;
            color:white;
            text-decoration:none;
            border-radius:5px;
            margin-top:20px;
        }

    </style>

</head>

<body>

<h1>🔒 Chain of Custody Log</h1>

<table>

<tr>
    <th>Log ID</th>
    <th>Evidence ID</th>
    <th>Action</th>
    <th>User</th>
    <th>Timestamp</th>
</tr>

{% for log in logs %}

<tr>

<td>{{ log.id }}</td>
<td>{{ log.evidence_id }}</td>
<td>{{ log.action }}</td>
<td>{{ log.username }}</td>
<td>{{ log.timestamp }}</td>

</tr>

{% endfor %}

</table>

<br>

<a href="/dashboard" class="btn">⬅ Back to Dashboard</a>

</body>
</html>
