{% extends "base.html" %}

{% block content %}

<div class="container">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">
            <h3>📞 Contact Us</h3>
        </div>

        <div class="card-body">

            <form method="POST">

                <div class="mb-3">
                    <label class="form-label">Name</label>
                    <input
                        type="text"
                        name="name"
                        class="form-control"
                        required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input
                        type="email"
                        name="email"
                        class="form-control"
                        required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Message</label>
                    <textarea
                        name="message"
                        rows="5"
                        class="form-control"
                        required></textarea>
                </div>

                <button type="submit" class="btn btn-success">
                    Send Message
                </button>

                <a href="/dashboard" class="btn btn-secondary">
                    Back
                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
