{% extends "base.html" %}

{% block content %}

<div class="container">

    <div class="card shadow">

        <div class="card-header bg-secondary text-white">
            <h3>⚙️ Account Settings</h3>
        </div>

        <div class="card-body">

            <form method="POST">

                <div class="mb-3">
                    <label>Current Password</label>
                    <input type="password"
                           name="current_password"
                           class="form-control"
                           required>
                </div>

                <div class="mb-3">
                    <label>New Password</label>
                    <input type="password"
                           name="new_password"
                           class="form-control"
                           required>
                </div>

                <button class="btn btn-primary">
                    Change Password
                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
